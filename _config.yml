theme: jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: Nebuscar's Blog
tagline: 个人技术博客，记录学习与思考
description: >-
  个人技术博客，记录学习与思考。

url: "https://nebuscar.github.io"
baseurl: ""

github:
  username: nebuscar

social:
  name: Nebuscar
  email: scar030120@gmail.com
  links:
    - https://github.com/nebuscar

theme_mode: # 空值 = 跟随系统自动切换

avatar: ""

toc: true

comments:
  active: ""

paginate: 10

kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: true

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - Gemfile.lock

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
